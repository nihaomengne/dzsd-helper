<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 收单录入辅助小程序</title>
    <style>
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background:#f5f7fb; margin:0; padding:24px; }
        .wrap { max-width: 420px; margin: 40px auto; background:#fff; border-radius:16px; padding:28px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
        h1 { margin:0 0 20px; font-size:24px; color:#1a3f77; text-align:center; }
        .form-group { margin-bottom:16px; }
        label { display:block; margin-bottom:8px; color:#334155; font-weight:600; }
        input { width:100%; box-sizing:border-box; padding:12px 14px; border:1px solid #cbd5e1; border-radius:10px; }
        button, .back { width:100%; display:block; text-align:center; padding:12px; border-radius:10px; border:none; text-decoration:none; font-weight:600; }
        button { background:#1a3f77; color:#fff; cursor:pointer; }
        .back { margin-top:12px; background:#eef2ff; color:#1a3f77; }
        .flash { padding:12px; border-radius:10px; margin-bottom:16px; font-size:14px; }
        .error { background:#fee2e2; color:#991b1b; }
        .success { background:#dcfce7; color:#166534; }
        .info { background:#e0f2fe; color:#075985; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>修改密码</h1>
        {% for category, message in get_flashed_messages(with_categories=true) %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        <form method="POST">
            <div class="form-group">
                <label for="old_password">原密码</label>
                <input id="old_password" type="password" name="old_password" required>
            </div>
            <div class="form-group">
                <label for="new_password">新密码</label>
                <input id="new_password" type="password" name="new_password" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm_password">确认新密码</label>
                <input id="confirm_password" type="password" name="confirm_password" required minlength="8">
            </div>
            <button type="submit">保存新密码</button>
            <a class="back" href="{{ url_for('index') }}">返回首页</a>
        </form>
    </div>
</body>
</html>
